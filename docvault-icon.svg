<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#131920"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#009e80"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#c4841c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#00D4AA" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Vault body -->
  <rect x="110" y="130" width="292" height="260" rx="18" ry="18" fill="none" stroke="url(#teal)" stroke-width="10" filter="url(#glow)" opacity="0.9"/>
  <rect x="120" y="140" width="272" height="240" rx="14" ry="14" fill="#19222d" opacity="0.8"/>

  <!-- Vault door lines horizontal -->
  <line x1="130" y1="200" x2="382" y2="200" stroke="#00D4AA" stroke-width="2.5" opacity="0.25"/>
  <line x1="130" y1="320" x2="382" y2="320" stroke="#00D4AA" stroke-width="2.5" opacity="0.25"/>

  <!-- Center dial / lock circle -->
  <circle cx="256" cy="260" r="62" fill="none" stroke="url(#teal)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="256" cy="260" r="46" fill="#0d1117" stroke="#00D4AA" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="260" r="18" fill="url(#teal)" filter="url(#glow)"/>

  <!-- Dial ticks -->
  <g stroke="#00D4AA" stroke-width="4" opacity="0.7">
    <line x1="256" y1="198" x2="256" y2="210"/>
    <line x1="256" y1="310" x2="256" y2="322"/>
    <line x1="194" y1="260" x2="206" y2="260"/>
    <line x1="306" y1="260" x2="318" y2="260"/>
  </g>

  <!-- Handle -->
  <rect x="340" y="240" width="32" height="40" rx="8" ry="8" fill="url(#gold)" opacity="0.9"/>

  <!-- PRO badge -->
  <rect x="194" y="376" width="124" height="34" rx="6" ry="6" fill="url(#gold)"/>
  <text x="256" y="399" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#000" text-anchor="middle" letter-spacing="4">PRO</text>

  <!-- DV letters top -->
  <text x="256" y="118" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="url(#teal)" text-anchor="middle" letter-spacing="8" opacity="0.7">DOCVAULT</text>
</svg>
